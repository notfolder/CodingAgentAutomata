# LiteLLM Proxy 設定（テスト環境用）
# テスト環境: mock_llm コンテナへ転送（実 API キー不要）
# 本番環境（test-real プロファイル）: 実際の OpenAI / Anthropic API に転送

# Master Key による認証を有効化（PostgreSQL DB で Virtual Key を管理）
general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY

model_list:
  # OpenAI GPT-4o mini（opencode テスト用）→ mock_llm に転送
  - model_name: openai/gpt-4o-mini
    litellm_params:
      model: openai/mock-gpt-4o-mini
      api_key: sk-mock-dummy
      api_base: http://mock_llm:4000/v1

  # Anthropic Claude（claude テスト用）→ mock_llm に転送
  - model_name: claude-3-haiku-20240307
    litellm_params:
      model: openai/mock-claude
      api_key: sk-mock-dummy
      api_base: http://mock_llm:4000/v1
