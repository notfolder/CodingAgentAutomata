# LiteLLM Proxy 設定（実 API モード: test-real プロファイル用）
# 実際の OpenAI / Anthropic API に転送する
# 事前に .env で OPENAI_API_KEY / ANTHROPIC_API_KEY / LITELLM_MASTER_KEY を設定すること

# Master Key による認証を有効化（PostgreSQL DB で Virtual Key を管理）
general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY

model_list:
  # OpenAI GPT-4o mini（opencode テスト用）→ 実際の OpenAI API を使用
  - model_name: openai/gpt-4o-mini
    litellm_params:
      model: openai/gpt-4o-mini
      api_key: os.environ/OPENAI_API_KEY

  # Anthropic Claude（claude テスト用）→ 実際の Anthropic API を使用
  - model_name: claude-3-haiku-20240307
    litellm_params:
      model: anthropic/claude-3-haiku-20240307
      api_key: os.environ/ANTHROPIC_API_KEY
