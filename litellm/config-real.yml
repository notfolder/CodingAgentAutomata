# LiteLLM Proxy 設定（実 API モード: test-real プロファイル用）
# 実際の OpenAI / Anthropic API に転送する
# 事前に .env で OPENAI_API_KEY / ANTHROPIC_API_KEY / LITELLM_MASTER_KEY を設定すること

# Master Key による認証を有効化（PostgreSQL DB で Virtual Key を管理）
general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY

model_list:
  # OpenAI GPT-4o mini（opencode テスト用: プレフィックスあり）→ 実際の OpenAI API を使用
  - model_name: openai/gpt-4o-mini
    litellm_params:
      model: openai/gpt-4o-mini
      api_key: os.environ/OPENAI_API_KEY

  # OpenAI GPT-4o mini（プレフィックスなし）
  # opencode CLI は "--model openai/gpt-4o-mini" を受け取った際に
  # プロバイダー部分を除いた "gpt-4o-mini" のみで LiteLLM に送信するため、
  # プレフィックスなしのエントリも登録しておく
  - model_name: gpt-4o-mini
    litellm_params:
      model: openai/gpt-4o-mini
      api_key: os.environ/OPENAI_API_KEY

  # Anthropic Claude Haiku 4.5（claude テスト用）→ 実際の Anthropic API を使用
  - model_name: claude-haiku-4-5-20251001
    litellm_params:
      model: anthropic/claude-haiku-4-5-20251001
      api_key: os.environ/ANTHROPIC_API_KEY
