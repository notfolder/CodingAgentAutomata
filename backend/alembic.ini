# Alembic設定ファイル
# backend コンポーネントで使用する DB マイグレーション設定

[alembic]
# マイグレーションスクリプトの格納ディレクトリ
script_location = alembic

# マイグレーションファイルの命名規則: <rev>_<slug>
file_template = %%(rev)s_%%(slug)s

# タイムゾーンを UTC に設定
timezone = UTC

# Python ソースコードのエンコーディング
source_encoding = utf-8

# データベース接続URL（env.py で上書きするため、ここはダミー値）
# 実際の接続URLは DATABASE_URL 環境変数から取得する
sqlalchemy.url = postgresql://user:password@postgresql:5432/db

[post_write_hooks]
# マイグレーションファイル生成後にフォーマットを適用する場合はここに設定

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
