version: "3.9"

# =============================================================
# CodingAgentAutomata docker-compose 設定
# 通常起動:                docker compose up
# テスト環境（LLMモック）: docker compose --profile test up
# テスト環境（実LLM）:     docker compose --profile test-real up
# CLIイメージビルド専用:   docker compose --profile build-only build
# =============================================================

services:

  # -------------------------------------------------------
  # PostgreSQL データベース
  # -------------------------------------------------------
  postgresql:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - codingagent_net

  # -------------------------------------------------------
  # RabbitMQ メッセージキュー（管理UIあり）
  # -------------------------------------------------------
  rabbitmq:
    image: rabbitmq:3.13-management
    restart: always
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-guest}
    ports:
      - "5672:5672"    # AMQP
      - "15672:15672"  # 管理UI
    networks:
      - codingagent_net

  # -------------------------------------------------------
  # Backend（FastAPI）
  # -------------------------------------------------------
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
      network: host
    image: ghcr.io/notfolder/codingagentautomata-backend:latest
    restart: always
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      - postgresql
      - rabbitmq
    networks:
      - codingagent_net

  # -------------------------------------------------------
  # Frontend（Vue 3 + nginx）
  # -------------------------------------------------------
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      network: host
    image: ghcr.io/notfolder/codingagentautomata-frontend:latest
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - codingagent_net

  # -------------------------------------------------------
  # Producer（Webhook受信・ポーリング）
  # -------------------------------------------------------
  producer:
    build:
      context: .
      dockerfile: producer/Dockerfile
      network: host
    image: ghcr.io/notfolder/codingagentautomata-producer:latest
    restart: always
    env_file:
      - .env
    depends_on:
      - postgresql
      - rabbitmq
    networks:
      - codingagent_net

  # -------------------------------------------------------
  # Consumer（タスク処理・CLIコンテナ管理）
  # Docker socket をマウントして動的コンテナ起動を可能にする
  # -------------------------------------------------------
  consumer:
    build:
      context: .
      dockerfile: consumer/Dockerfile
      network: host
    image: ghcr.io/notfolder/codingagentautomata-consumer:latest
    restart: always
    env_file:
      - .env
    depends_on:
      - postgresql
      - rabbitmq
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - codingagent_net

  # -------------------------------------------------------
  # モック LLM サーバー（テスト環境専用）
  # OpenAI / LiteLLM Proxy 互換のダミー API を提供する
  # 実際の OpenAI / Anthropic API キーなしで E2E テストを実行可能にする
  # -------------------------------------------------------
  mock_llm:
    build:
      context: mock-llm/
    image: ghcr.io/notfolder/codingagentautomata-mock-llm:latest
    restart: always
    profiles:
      - test
    ports:
      - "4000:4000"
    networks:
      - codingagent_net

  # -------------------------------------------------------
  # GitLab CE（テスト環境専用）
  # -------------------------------------------------------
  gitlab:
    image: gitlab/gitlab-ce:latest
    restart: always
    profiles:
      - test
      - test-real
    environment:
      GITLAB_OMNIBUS_CONFIG: |
        external_url 'http://localhost:8929'
    ports:
      - "8929:80"
    networks:
      - codingagent_net

  # -------------------------------------------------------
  # LiteLLM Proxy（実LLMモード / 単独起動）
  # profiles:
  #   litellm   → docker compose --profile litellm up（単独動作確認用）
  #   test-real → docker compose --profile test-real up（E2E実LLMモード）
  # -------------------------------------------------------
  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    restart: always
    profiles:
      - litellm
      - test-real
    environment:
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    ports:
      - "4001:4000"
    volumes:
      - ./litellm/config.yml:/app/config.yml
    networks:
      - codingagent_net

  # -------------------------------------------------------
  # Playwright E2Eテスト実行コンテナ（モックLLMモード）
  # mock_llm を使用する（実APIキー不要）
  # 起動: docker compose --profile test up -d
  # 実行: docker compose run --rm test_playwright sh -c "npm install && npx playwright test"
  # -------------------------------------------------------
  test_playwright:
    image: mcr.microsoft.com/playwright:v1.59.0
    profiles:
      - test
    working_dir: /e2e
    environment:
      LLM_MODE: mock
    volumes:
      - ./e2e:/e2e
    networks:
      - codingagent_net
    depends_on:
      - frontend
      - mock_llm

  # -------------------------------------------------------
  # Playwright E2Eテスト実行コンテナ（実LLMモード）
  # LiteLLM Proxy 経由で実際の OpenAI / Anthropic API を呼び出す
  # 事前に .env に OPENAI_API_KEY / LITELLM_MASTER_KEY を設定すること
  # 起動: docker compose --profile test-real up -d
  # 実行: docker compose run --rm test_playwright_real sh -c "npm install && npx playwright test"
  # -------------------------------------------------------
  test_playwright_real:
    image: mcr.microsoft.com/playwright:v1.59.0
    profiles:
      - test-real
    working_dir: /e2e
    environment:
      LLM_MODE: real
    volumes:
      - ./e2e:/e2e
    networks:
      - codingagent_net
    depends_on:
      - frontend
      - litellm

  # -------------------------------------------------------
  # Claude CLI exec イメージビルド専用サービス
  # -------------------------------------------------------
  cli_exec_claude:
    build:
      context: cli-exec/claude/
    image: coding-agent-cli-exec-claude:latest
    profiles:
      - build-only
    networks:
      - codingagent_net

  # -------------------------------------------------------
  # opencode CLI exec イメージビルド専用サービス
  # -------------------------------------------------------
  cli_exec_opencode:
    build:
      context: cli-exec/opencode/
    image: coding-agent-cli-exec-opencode:latest
    profiles:
      - build-only
    networks:
      - codingagent_net

# =============================================================
# ボリューム定義
# =============================================================
volumes:
  postgres_data:

# =============================================================
# ネットワーク定義
# =============================================================
networks:
  codingagent_net:
    driver: bridge
