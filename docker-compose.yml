version: "3.9"

# =============================================================
# CodingAgentAutomata docker-compose 設定
# 通常起動:                docker compose up
# テスト環境（LLMモック）: docker compose --profile test up
# テスト環境（実LLM）:     docker compose --profile test-real up
# CLIイメージビルド専用:   docker compose --profile build-only build
# =============================================================

services:

  # -------------------------------------------------------
  # PostgreSQL データベース
  # -------------------------------------------------------
  postgresql:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - codingagent_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-user} -d ${POSTGRES_DB:-db}"]
      interval: 3s
      timeout: 3s
      retries: 10
      start_period: 5s

  # -------------------------------------------------------
  # PostgreSQL（LiteLLM 専用）
  # backend/producer/consumer とは完全に分離した独立インスタンス
  # -------------------------------------------------------
  postgresql_litellm:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_USER: litellm
      POSTGRES_PASSWORD: litellm
      POSTGRES_DB: litellm_db
    volumes:
      - postgres_litellm_data:/var/lib/postgresql/data
    networks:
      - codingagent_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U litellm -d litellm_db"]
      interval: 3s
      timeout: 3s
      retries: 10
      start_period: 5s

  # -------------------------------------------------------
  # RabbitMQ メッセージキュー（管理UIあり）
  # -------------------------------------------------------
  rabbitmq:
    image: rabbitmq:3.13-management
    restart: always
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-guest}
    ports:
      - "5672:5672"    # AMQP
      - "15672:15672"  # 管理UI
    networks:
      - codingagent_net

  # -------------------------------------------------------
  # Backend（FastAPI）
  # -------------------------------------------------------
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
      network: host
    image: ghcr.io/notfolder/codingagentautomata-backend:latest
    restart: always
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      postgresql:
        condition: service_healthy
      rabbitmq:
        condition: service_started
    networks:
      - codingagent_net

  # -------------------------------------------------------
  # Frontend（Vue 3 + nginx）
  # -------------------------------------------------------
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      network: host
    image: ghcr.io/notfolder/codingagentautomata-frontend:latest
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - codingagent_net

  # -------------------------------------------------------
  # Producer（Webhook受信・ポーリング）
  # -------------------------------------------------------
  producer:
    build:
      context: .
      dockerfile: producer/Dockerfile
      network: host
    image: ghcr.io/notfolder/codingagentautomata-producer:latest
    restart: always
    env_file:
      - .env
      - path: .env.test
        required: false
    environment:
      # .env.test のlocalhost URL をDockerネットワーク内部名で上書き
      GITLAB_API_URL: http://gitlab:8929
    depends_on:
      - postgresql
      - rabbitmq
    networks:
      - codingagent_net

  # -------------------------------------------------------
  # Consumer（タスク処理・CLIコンテナ管理）
  # Docker socket をマウントして動的コンテナ起動を可能にする
  # -------------------------------------------------------
  consumer:
    build:
      context: .
      dockerfile: consumer/Dockerfile
      network: host
    image: ghcr.io/notfolder/codingagentautomata-consumer:latest
    restart: always
    # 処理中タスクの完了を待つためのグレースフルシャットダウン期間
    # CLI_EXEC_TIMEOUT_SEC(90秒) + 余裕 → 120秒
    stop_grace_period: 120s
    env_file:
      - .env
      - path: .env.test
        required: false
    environment:
      # .env.test のlocalhost URL をDockerネットワーク内部名で上書き
      GITLAB_API_URL: http://gitlab:8929
      # CLI 実行タイムアウトをテスト環境向けに短縮（デフォルト 3 時間 → 90 秒）
      CLI_EXEC_TIMEOUT_SEC: "90"
      # DinD コンテナ起動の遅延（T-30 後等の高負荷時）に対応するため Docker クライアントタイムアウトを延長
      DOCKER_CLIENT_TIMEOUT_SEC: "240"
    depends_on:
      - postgresql
      - rabbitmq
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - codingagent_net

  # -------------------------------------------------------
  # モック LLM サーバー（テスト環境専用）
  # OpenAI / LiteLLM Proxy 互換のダミー API を提供する
  # 実際の OpenAI / Anthropic API キーなしで E2E テストを実行可能にする
  # -------------------------------------------------------
  mock_llm:
    build:
      context: mock-llm/
    image: ghcr.io/notfolder/codingagentautomata-mock-llm:latest
    restart: always
    profiles:
      - test
    ports:
      - "4000:4000"
    environment:
      # F-4 (MR処理) のレスポンスに遅延を入れる
      # monitor_assignees (5秒間隔) が bot のアサイン解除を検知できるようにする
      MOCK_LLM_RESPONSE_DELAY_SEC: "20"
      # デフォルトモデル（.env の DEFAULT_*_MODEL で変更可能）
      DEFAULT_CLAUDE_MODEL: ${DEFAULT_CLAUDE_MODEL:-claude-haiku-4-5-20251001}
      DEFAULT_OPENAI_MODEL: ${DEFAULT_OPENAI_MODEL:-gpt-4o-mini}
      DEFAULT_OPENAI_MODEL_LITELLM: ${DEFAULT_OPENAI_MODEL_LITELLM:-openai/gpt-4o-mini}
    networks:
      - codingagent_net

  # -------------------------------------------------------
  # GitLab CE（テスト環境専用）
  # -------------------------------------------------------
  gitlab:
    image: gitlab/gitlab-ce:latest
    restart: always
    profiles:
      - test
      - test-real
    environment:
      GITLAB_OMNIBUS_CONFIG: |
        external_url 'http://localhost:8929'
        gitlab_rails['allow_local_requests_from_web_hooks_and_services'] = true
        gitlab_rails['outbound_local_requests_allowlist'] = ['producer']
    ports:
      - "8929:8929"
    networks:
      - codingagent_net

  # -------------------------------------------------------
  # LiteLLM Proxy（モック LLM モード: test プロファイル）
  # mock_llm コンテナへ転送する（実 API キー不要）
  # 起動: docker compose --profile test up
  # -------------------------------------------------------
  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    restart: always
    profiles:
      - test
    # config.yml を明示的に指定して起動
    command: ["--config", "/app/config.yml", "--port", "4000"]
    environment:
      # LiteLLM の Master Key（Virtual Key 発行・検証に使用）
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY:-sk-litellm-master-e2e-test}
      # PostgreSQL への接続（litellm 専用 DB を使用）
      DATABASE_URL: postgresql://litellm:litellm@postgresql_litellm:5432/litellm_db
      # デフォルトモデル（.env の DEFAULT_*_MODEL で変更可能）
      DEFAULT_CLAUDE_MODEL: ${DEFAULT_CLAUDE_MODEL:-claude-haiku-4-5-20251001}
      DEFAULT_OPENAI_MODEL: ${DEFAULT_OPENAI_MODEL:-gpt-4o-mini}
      DEFAULT_OPENAI_MODEL_LITELLM: ${DEFAULT_OPENAI_MODEL_LITELLM:-openai/gpt-4o-mini}
    ports:
      - "4001:4000"
    volumes:
      - ./litellm/config.yml:/app/config.yml
    depends_on:
      postgresql_litellm:
        condition: service_healthy
      mock_llm:
        condition: service_started
    networks:
      - codingagent_net

  # -------------------------------------------------------
  # LiteLLM Proxy（実 LLM モード: test-real プロファイル）
  # 実際の OpenAI / Anthropic API を呼び出す
  # 事前に .env に OPENAI_API_KEY / ANTHROPIC_API_KEY を設定すること
  # 起動: docker compose --profile test-real up
  # -------------------------------------------------------
  litellm_real:
    image: ghcr.io/berriai/litellm:main-latest
    restart: always
    profiles:
      - test-real
    # config-real.yml を明示的に指定して起動
    command: ["--config", "/app/config.yml", "--port", "4000"]
    environment:
      # LiteLLM の Master Key（Virtual Key 発行・検証に使用）
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY:-sk-litellm-master-e2e-test}
      # PostgreSQL への接続（litellm 専用 DB を使用）
      DATABASE_URL: postgresql://litellm:litellm@postgresql_litellm:5432/litellm_db
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      # デフォルトモデル（.env の DEFAULT_*_MODEL で変更可能）
      DEFAULT_CLAUDE_MODEL: ${DEFAULT_CLAUDE_MODEL:-claude-haiku-4-5-20251001}
      DEFAULT_CLAUDE_MODEL_LITELLM: ${DEFAULT_CLAUDE_MODEL_LITELLM:-anthropic/claude-haiku-4-5-20251001}
      DEFAULT_OPENAI_MODEL: ${DEFAULT_OPENAI_MODEL:-gpt-4o-mini}
      DEFAULT_OPENAI_MODEL_LITELLM: ${DEFAULT_OPENAI_MODEL_LITELLM:-openai/gpt-4o-mini}
    ports:
      - "4001:4000"
    volumes:
      - ./litellm/config-real.yml:/app/config.yml
    depends_on:
      postgresql_litellm:
        condition: service_healthy
    networks:
      codingagent_net:
        # Consumer が常に "litellm" として名前解決できるようにネットワークエイリアスを設定
        aliases:
          - litellm

  # -------------------------------------------------------
  # Playwright E2Eテスト実行コンテナ（モックLLMモード）
  # mock_llm を使用する（実APIキー不要）
  # 起動: docker compose --profile test up -d
  # 実行: docker compose run --rm test_playwright sh -c "npm install && npx playwright test"
  # -------------------------------------------------------
  test_playwright:
    image: mcr.microsoft.com/playwright:v1.59.0
    profiles:
      - test
    working_dir: /e2e
    # .env.test が存在する場合に GITLAB_ADMIN_TOKEN / GITLAB_PROJECT_ID 等を読み込む
    env_file:
      - path: .env.test
        required: false
    environment:
      LLM_MODE: mock
      # コンテナ内から到達可能なDockerサービス名でURLを上書き
      GITLAB_API_URL: http://gitlab:8929
      BACKEND_URL: http://backend:8000
      BASE_URL: http://frontend:80
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-guest}
      RABBITMQ_MGMT_URL: http://rabbitmq:15672
      # デフォルトモデル（.env の DEFAULT_*_MODEL で変更可能）
      DEFAULT_CLAUDE_MODEL: ${DEFAULT_CLAUDE_MODEL:-claude-haiku-4-5-20251001}
      DEFAULT_OPENAI_MODEL: ${DEFAULT_OPENAI_MODEL:-gpt-4o-mini}
      DEFAULT_OPENAI_MODEL_LITELLM: ${DEFAULT_OPENAI_MODEL_LITELLM:-openai/gpt-4o-mini}
      # 管理者・テストユーザー認証情報
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-Admin@123456}
      TEST_USER_PASSWORD: ${TEST_USER_PASSWORD:-Test@123456}
      # Webhook エンドポイント（グループWebhookテスト用）
      WEBHOOK_URL: http://producer:8080/webhook
    volumes:
      - ./e2e:/e2e
    networks:
      - codingagent_net
    depends_on:
      - frontend
      - mock_llm
      - producer

  # -------------------------------------------------------
  # Playwright E2Eテスト実行コンテナ（実LLMモード）
  # LiteLLM Proxy 経由で実際の OpenAI / Anthropic API を呼び出す
  # 事前に .env に OPENAI_API_KEY / LITELLM_MASTER_KEY を設定すること
  # 起動: docker compose --profile test-real up -d
  # 実行: docker compose run --rm test_playwright_real sh -c "npm install && npx playwright test"
  # -------------------------------------------------------
  test_playwright_real:
    image: mcr.microsoft.com/playwright:v1.59.0
    profiles:
      - test-real
    working_dir: /e2e
    # .env.test が存在する場合に GITLAB_ADMIN_TOKEN / GITLAB_PROJECT_ID 等を読み込む
    env_file:
      - path: .env.test
        required: false
    environment:
      LLM_MODE: real
      # コンテナ内から到達可能なDockerサービス名でURLを上書き
      GITLAB_API_URL: http://gitlab:8929
      BACKEND_URL: http://backend:8000
      BASE_URL: http://frontend:80
      # デフォルトモデル（.env の DEFAULT_*_MODEL で変更可能）
      DEFAULT_CLAUDE_MODEL: ${DEFAULT_CLAUDE_MODEL:-claude-haiku-4-5-20251001}
      DEFAULT_OPENAI_MODEL: ${DEFAULT_OPENAI_MODEL:-gpt-4o-mini}
      DEFAULT_OPENAI_MODEL_LITELLM: ${DEFAULT_OPENAI_MODEL_LITELLM:-openai/gpt-4o-mini}
      # 管理者・テストユーザー認証情報
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-Admin@123456}
      TEST_USER_PASSWORD: ${TEST_USER_PASSWORD:-Test@123456}
      # Webhook エンドポイント（グループWebhookテスト用）
      WEBHOOK_URL: http://producer:8080/webhook
    volumes:
      - ./e2e:/e2e
    networks:
      - codingagent_net
    depends_on:
      - frontend
      - litellm_real
      - producer

  # -------------------------------------------------------
  # Claude CLI exec イメージビルド専用サービス
  # -------------------------------------------------------
  cli_exec_claude:
    build:
      context: cli-exec/claude/
    image: coding-agent-cli-exec-claude:latest
    profiles:
      - build-only
    networks:
      - codingagent_net

  # -------------------------------------------------------
  # opencode CLI exec イメージビルド専用サービス
  # -------------------------------------------------------
  cli_exec_opencode:
    build:
      context: cli-exec/opencode/
    image: coding-agent-cli-exec-opencode:latest
    profiles:
      - build-only
    networks:
      - codingagent_net

# =============================================================
# ボリューム定義
# =============================================================
volumes:
  postgres_data:
  # LiteLLM 専用 PostgreSQL のデータボリューム
  postgres_litellm_data:

# =============================================================
# ネットワーク定義
# =============================================================
networks:
  codingagent_net:
    driver: bridge
